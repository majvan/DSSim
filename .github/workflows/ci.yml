name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run Unit Tests
        run: python -m unittest discover -s tests -p "test_*.py"

  examples:
    name: Examples (run_all.sh)
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Examples
        run: |
          bash examples/run_all.sh > examples_run_all.log 2>&1 || {
            echo "examples/run_all.sh failed. Showing last 300 lines:"
            tail -n 300 examples_run_all.log
            exit 1
          }
